[build]
  base    = "apps/web"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect all unmatched routes to Next.js (handled by the plugin, but explicit fallback)
[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/___netlify-handler"
  status = 200
